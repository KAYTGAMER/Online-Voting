<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-3">Cast Your Vote</h3>

        <form method="POST">
            {% for cid, name in candidates %}
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="candidate" value="{{ cid }}" required>
                    <label class="form-check-label">
                        {{ name }}
                    </label>
                </div>
            {% endfor %}

            <button class="btn btn-success mt-3 w-100">Submit Vote</button>
        </form>

        <a href="/logout" class="btn btn-danger mt-3 w-100">Logout</a>
    </div>
</div>

</body>
</html>
